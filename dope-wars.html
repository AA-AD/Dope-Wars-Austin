    const OFFICER_LINES = [
      "APD Officer Hardass and {n} units are on your tail!",
      "Texas Rangers! {n} officers closing in!",
      "Travis County Sheriff spotted you! {n} deputies inbound!",
      "Undercover DEA! {n} agents are surrounding you!",
      "APD drug task force! {n} officers with K-9 units!",
      "Officer sees a dog to pet. You gain a head start. {n} cops still chasing though.",
      "A cop is too busy tweeting about potholes. {n} remain focused.",
    ];

    const MAX_DAYS = 30;
    const STARTING_CASH = 2000;
    const STARTING_DEBT = 5500;
    const DEBT_INTEREST = 0.10;
    const STARTING_COAT = 100;
    const STARTING_HP = 100;
    const MAX_HP = 100;
    const COAT_UPGRADE_SLOTS = 15;

    function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function roll(c) { return Math.random() < c; }

    function genPrices(ev, mods) {
      const p = {};
      DRUGS.forEach((d) => {
        let price = rand(d.min, d.max);
        if (ev && ev.drug === d.name) price = Math.round(price * ev.mult);
        if (mods) {
          if (mods.fireSale) price = Math.round(price * 0.5);
          if (mods.festival && (d.cat === "party" || d.cat === "psych")) price = Math.round(price * 2.5);
          if (mods.influencer) price = Math.round(price * 1.4);
          if (mods.sxsw && (d.cat === "party")) price = Math.round(price * 3);
        }
        p[d.name] = Math.max(1, price);
      });
      return p;
    }

    function pickPriceEvent() {
      if (!roll(0.45)) return null;
      const ev = PRICE_EVENTS[rand(0, PRICE_EVENTS.length - 1)];
      const pool = ev.any ? DRUGS : DRUGS.filter((d) => ev.drugs.includes(d.name));
      const drug = pool[rand(0, pool.length - 1)];
      return { msg: ev.msg.replace("{drug}", drug.emoji + " " + drug.name), drug: drug.name, type: ev.type, mult: ev.mult };
    }

    function pickScenarios(state) {
      const results = [];
      RANDOM_SCENARIOS.forEach((sc) => {
        if (roll(sc.chance)) results.push(sc);
      });
      return results.slice(0, 3);
    }

    function bestGun(weapons) {
      if (weapons.length === 0) return null;
      return weapons.reduce((best, w) => {
        const g = GUNS.find((g) => g.name === w);
        const b = GUNS.find((g) => g.name === best);
        return g && b && (g.dmg[0] + g.dmg[1]) > (b.dmg[0] + b.dmg[1]) ? w : best;
      });
    }

    // ─── COMPONENTS ────────────────────────────────────────────────────────────────

    function StatusBar({ s, invCount }) {
      const gun = bestGun(s.weapons);
      const items = [
        { l: "Cash", v: `$${s.cash.toLocaleString()}`, c: "text-green-400", bg: "border-green-800" },
        { l: "Bank", v: `$${s.bank.toLocaleString()}`, c: "text-emerald-400", bg: "border-emerald-800" },
        { l: "Debt", v: `$${s.debt.toLocaleString()}`, c: "text-red-400", bg: "border-red-800" },
        { l: "Day", v: `${s.day}/${MAX_DAYS}`, c: "text-blue-400", bg: "border-blue-800" },
        { l: "HP", v: `${s.health}/${MAX_HP}`, c: s.health < 30 ? "text-red-400" : "text-pink-400", bg: s.health < 30 ? "border-red-700" : "border-pink-800" },
        { l: "Coat", v: `${invCount}/${s.coatSize}`, c: "text-purple-400", bg: "border-purple-800" },
        { l: "Gun", v: gun || "None", c: "text-amber-400", bg: "border-amber-800" },
      ];
      return (
        <div className="flex flex-wrap gap-1.5 text-xs mb-4">
          {items.map((it) => (
            <div key={it.l} className={`flex items-center gap-1.5 bg-gray-900 px-2.5 py-1.5 rounded-md border ${it.bg}`}>
              <span className="text-gray-500">{it.l}</span>
              <span className={`${it.c} font-bold font-mono`}>{it.v}</span>
            </div>
          ))}
        </div>
      );
    }

    function HPBar({ health }) {
      const pct = Math.max(0, Math.min(100, health));
      const color = pct > 60 ? "bg-green-500" : pct > 30 ? "bg-yellow-500" : "bg-red-500";
      return (
        <div className="w-full bg-gray-800 rounded-full h-2 mb-4 overflow-hidden">
          <div className={`${color} h-full rounded-full transition-all duration-500`} style={{ width: `${pct}%` }} />
        </div>
      );
    }

    function EventBanner({ event, scenarios }) {
      const msgs = [];
      if (event) msgs.push({ text: event.msg, type: event.type === "spike" ? "hot" : "cold" });
      scenarios.forEach((sc) => msgs.push({ text: sc.displayMsg || sc.msg, type: sc.good ? "good" : sc.bad ? "bad" : "neutral" }));

      if (msgs.length === 0) return null;
      return (
        <div className="space-y-2 mb-4">
          {msgs.map((m, i) => {
            const styles = {
              hot: "bg-orange-950 border-orange-700 text-orange-300",
              cold: "bg-cyan-950 border-cyan-700 text-cyan-300",
              good: "bg-green-950 border-green-700 text-green-300",
              bad: "bg-red-950 border-red-700 text-red-300",
              neutral: "bg-gray-800 border-gray-600 text-gray-300",
            };
            return (
              <div key={i} className={`p-2.5 rounded-lg border text-xs font-medium ${styles[m.type]}`}>
                {m.text}
              </div>
            );
          })}
        </div>
      );
    }

    function MarketTable({ prices, inventory, cash, onBuy, onSell, invCount, coatSize, doubleSell }) {
      const [amts, setAmts] = useState({});
      const setAmt = (n, v) => setAmts((p) => ({ ...p, [n]: v }));
      const getAmt = (n) => Math.max(1, parseInt(amts[n]) || 1);
      const maxBuy = (d) => {
        const pr = prices[d];
        return pr > 0 ? Math.max(0, Math.min(Math.floor(cash / pr), coatSize - invCount)) : 0;
      };

      return (
        <div className="overflow-x-auto">
          {doubleSell && <div className="text-xs text-yellow-400 mb-2 font-bold">⭐ DOUBLE SELL PRICES ACTIVE!</div>}
          <table className="w-full text-sm">
            <thead>
              <tr className="text-gray-500 border-b border-gray-700 text-xs uppercase tracking-wider">
                <th className="text-left py-2 pr-1">Drug</th>
                <th className="text-right py-2 px-1">Price</th>
                <th className="text-right py-2 px-1">Have</th>
                <th className="text-center py-2 px-1">Qty</th>
                <th className="text-center py-2 pl-1">Trade</th>
              </tr>
            </thead>
            <tbody>
              {DRUGS.map((d) => {
                const price = prices[d.name];
                const sellPrice = doubleSell ? price * 2 : price;
                const owned = inventory[d.name] || 0;
                const amt = getAmt(d.name);
                const canBuy = amt <= maxBuy(d.name);
                const canSell = owned >= amt;
                return (
                  <tr key={d.name} className="border-b border-gray-800 hover:bg-white hover:bg-opacity-5 transition-colors">
                    <td className="py-2 pr-1 font-medium text-xs">
                      <span className="mr-1">{d.emoji}</span>{d.name}
                    </td>
                    <td className="text-right py-2 px-1 font-mono text-xs">
                      <span className="text-green-400">${price.toLocaleString()}</span>
                      {doubleSell && owned > 0 && <span className="text-yellow-400 ml-1">(sell: ${sellPrice.toLocaleString()})</span>}
                    </td>
                    <td className="text-right py-2 px-1 text-yellow-400 font-mono text-xs">{owned}</td>
                    <td className="text-center py-2 px-1">
                      <div className="flex items-center justify-center gap-0.5">
                        <button onClick={() => setAmt(d.name, String(maxBuy(d.name)))}
                          className="text-xs text-blue-400 hover:text-blue-300 cursor-pointer px-0.5">M</button>
                        <input type="number" min="1" value={amts[d.name] || ""} placeholder="1"
                          onChange={(e) => setAmt(d.name, e.target.value)}
                          className="w-12 bg-gray-800 border border-gray-600 rounded px-1 py-0.5 text-center text-white text-xs focus:border-blue-500 focus:outline-none" />
                      </div>
                    </td>
                    <td className="text-center py-2 pl-1">
                      <div className="flex gap-1 justify-center">
                        <button onClick={() => onBuy(d.name, amt)} disabled={!canBuy}
                          className={`px-2 py-0.5 rounded text-xs font-bold transition-all ${canBuy ? "bg-green-600 hover:bg-green-500 text-white cursor-pointer" : "bg-gray-700 text-gray-500 cursor-not-allowed"}`}>
                          BUY</button>
                        <button onClick={() => onSell(d.name, amt)} disabled={!canSell}
                          className={`px-2 py-0.5 rounded text-xs font-bold transition-all ${canSell ? "bg-red-600 hover:bg-red-500 text-white cursor-pointer" : "bg-gray-700 text-gray-500 cursor-not-allowed"}`}>
                          SELL</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

    function DopeWars() {
      const [s, setS] = useState(newGame);
      const [scores, setScores] = useState([]);
      const [tab, setTab] = useState("travel");
      const invCount = Object.values(s.inventory).reduce((a, b) => a + b, 0);
      const crewCost = s.crew.length > 0 ? s.crew.reduce((sum, id) => sum + (CREW_MEMBERS.find(c => c.id === id)?.cost || 0), 0) : 0;

      const addLog = (...msgs) => setS((p) => ({ ...p, log: [...msgs, ...p.log].slice(0, 100) }));

      const buy = (drug, amt) => {
        setS((p) => {
          const cost = p.prices[drug] * amt;
          const cnt = Object.values(p.inventory).reduce((a, b) => a + b, 0);
          if (cost > p.cash || cnt + amt > p.coatSize) return p;
          const newRep = { ...p.reputation };
          newRep[p.location] = Math.min(100, (newRep[p.location] || 50) + 1);
          return { ...p, cash: p.cash - cost, inventory: { ...p.inventory, [drug]: (p.inventory[drug] || 0) + amt },
            reputation: newRep,
            log: [`Bought ${amt} ${drug} for $${cost.toLocaleString()}`, ...p.log].slice(0, 100) };
        });
      };

      const sell = (drug, amt) => {
        setS((p) => {
          const owned = p.inventory[drug] || 0;
          if (amt > owned) return p;
          const unitPrice = p.doubleSell ? p.prices[drug] * 2 : p.prices[drug];
          const rev = unitPrice * amt;
          const inv = { ...p.inventory }; inv[drug] = owned - amt; if (inv[drug] <= 0) delete inv[drug];
          const newRep = { ...p.reputation };
          newRep[p.location] = Math.min(100, (newRep[p.location] || 50) + 1);
          return { ...p, cash: p.cash + rev, inventory: inv, reputation: newRep,
            log: [`Sold ${amt} ${drug} for $${rev.toLocaleString()}${p.doubleSell ? " (DOUBLE!)" : ""}`, ...p.log].slice(0, 100) };
        });
      };

      const processScenarios = (state, scenarios) => {
        let newState = { ...state };
        const queue = [];
        const logs = [];

        scenarios.forEach((sc) => {
          const amount = sc.minAmt ? rand(sc.minAmt, sc.maxAmt) : 0;
          let displayMsg = sc.msg.replace("{amount}", amount.toLocaleString());

          switch (sc.type) {
            case "cash_find": {
              newState.cash += amount;
              logs.push(displayMsg);
              break;
            }
            case "heal": {
              const heal = Math.min(amount, MAX_HP - newState.health);
              newState.health = Math.min(MAX_HP, newState.health + heal);
              displayMsg = sc.msg.replace("{amount}", heal);
              logs.push(displayMsg);
              break;
            }
            case "free_drug": {
              const d = DRUGS[rand(0, DRUGS.length - 1)];
              const qty = rand(1, 5);
              const cnt = Object.values(newState.inventory).reduce((a, b) => a + b, 0);
              if (cnt + qty <= newState.coatSize) {
                newState.inventory = { ...newState.inventory, [d.name]: (newState.inventory[d.name] || 0) + qty };
                logs.push(sc.msg.replace("{drug}", `${qty}x ${d.emoji} ${d.name}`));
              }
              break;
            }
            case "tip": {
              const d = DRUGS[rand(0, DRUGS.length - 1)];
              const loc = LOCATIONS[rand(0, LOCATIONS.length - 1)];
              logs.push(sc.msg.replace("{drug}", d.emoji + " " + d.name).replace("{location}", loc.name));
              break;
            }
            case "double_sell":
              newState.doubleSell = true;
              logs.push(displayMsg);
              break;
            case "mugging": {
              const loss = Math.min(amount, newState.cash);
              newState.cash -= loss;
              displayMsg = sc.msg.replace("${amount}", `$${loss.toLocaleString()}`);
              logs.push(displayMsg);
              break;
            }
            case "damage":
              newState.health = Math.max(0, newState.health - amount);
              logs.push(displayMsg);
              if (newState.health <= 0) { newState.dead = true; newState.gameOver = true; }
              break;
            case "stolen_drugs": {
              const inv = { ...newState.inventory };
              const keys = Object.keys(inv);
              if (keys.length > 0) {
                const k = keys[rand(0, keys.length - 1)];
                const stolen = Math.ceil(inv[k] * 0.3);
                inv[k] -= stolen; if (inv[k] <= 0) delete inv[k];
                newState.inventory = inv;
                logs.push(`${sc.msg} Lost ${stolen} ${k}.`);
              }
              break;
            }
            case "tax":
              queue.push({ ...sc, displayMsg: sc.msg.replace("${amount}", `$${amount.toLocaleString()}`), amount,
                choices: [
                  { label: `Pay $${amount.toLocaleString()}`, action: "pay", style: "bg-red-600 hover:bg-red-500 text-white", disabled: newState.cash < amount },
                  { label: "Refuse", action: "refuse", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]});
              break;
            case "scam": {
              const scamLoss = Math.min(amount, newState.cash);
              newState.cash -= scamLoss;
              logs.push(sc.msg.replace("${amount}", `$${scamLoss.toLocaleString()}`));
              break;
            }
            case "wild_fire_sale":
              newState.mods = { ...newState.mods, fireSale: true };
              newState.prices = genPrices(newState.event, newState.mods);
              logs.push(sc.msg);
              break;
            case "wild_festival":
              newState.mods = { ...newState.mods, festival: true };
              newState.prices = genPrices(newState.event, newState.mods);
              logs.push(sc.msg);
              break;
            case "wild_influencer":
              newState.mods = { ...newState.mods, influencer: true };
              newState.prices = genPrices(newState.event, newState.mods);
              logs.push(sc.msg);
              break;
            case "wild_snitch":
              logs.push(sc.msg);
              break;
            case "wild_blackout":
              logs.push(sc.msg);
              break;
            case "wild_rival":
              queue.push({ ...sc, displayMsg: sc.msg,
                choices: [
                  { label: "Accept Challenge", action: "accept", style: "bg-red-600 hover:bg-red-500 text-white" },
                  { label: "Walk Away", action: "decline", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]});
              break;
            case "wild_tornado":
            case "wild_heat_wave":
              logs.push(sc.msg);
              break;
            case "wild_friend":
              newState.protection = true;
              logs.push(sc.msg);
              break;
            case "wild_stash_house":
              queue.push({ ...sc, displayMsg: sc.msg,
                choices: [
                  { label: "Search It", action: "search", style: "bg-amber-600 hover:bg-amber-500 text-white" },
                  { label: "Too Risky", action: "skip", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]});
              break;
            case "wild_corrupt_cop":
              queue.push({ ...sc, displayMsg: sc.msg.replace("${amount}", `$${amount.toLocaleString()}`), amount,
                choices: [
                  { label: `Pay $${amount.toLocaleString()}`, action: "pay", style: "bg-purple-600 hover:bg-purple-500 text-white", disabled: newState.cash < amount },
                  { label: "No Thanks", action: "decline", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]});
              break;
            case "wild_hospital":
              queue.push({ ...sc, displayMsg: sc.msg.replace("${amount}", `$${amount.toLocaleString()}`), amount,
                choices: [
                  { label: `Pay $${amount.toLocaleString()} (Full Heal)`, action: "heal", style: "bg-pink-600 hover:bg-pink-500 text-white", disabled: newState.cash < amount },
                  { label: "Pass", action: "decline", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]});
              break;
            case "austin_good":
              logs.push(displayMsg);
              break;
            case "austin_bad": {
              if (sc.loss) newState.cash -= sc.loss;
              logs.push(displayMsg);
              break;
            }
            default:
              logs.push(displayMsg || sc.msg);
          }
        });

        newState.log = [...logs, ...newState.log].slice(0, 100);
        newState.scenarioQueue = queue;
        newState.scenario = queue.length > 0 ? queue[0] : null;
        return newState;
      };

      const resolveScenario = (action) => {
        setS((p) => {
          if (!p.scenario) return p;
          const sc = p.scenario;
          let newState = { ...p };
          const logs = [];

          switch (sc.type) {
            case "tax":
              if (action === "pay") { newState.cash -= sc.amount; logs.push(`Paid the gang $${sc.amount.toLocaleString()}.`); }
              else { const dmg = rand(10, 25); newState.health = Math.max(0, newState.health - dmg); logs.push(`You refused. They beat you up. -${dmg} HP.`);
                if (newState.health <= 0) { newState.dead = true; newState.gameOver = true; } }
              break;
            case "wild_rival":
              if (action === "accept") {
                if (roll(0.5 + (newState.weapons.length > 0 ? 0.2 : 0))) {
                  const prize = rand(1000, 8000);
                  newState.cash += prize; logs.push(`You won the turf war! Earned $${prize.toLocaleString()}.`);
                  newState.kills = (newState.kills || 0) + 1;
                } else {
                  const dmg = rand(15, 35); newState.health = Math.max(0, newState.health - dmg);
                  logs.push(`You lost the fight. -${dmg} HP.`);
                  if (newState.health <= 0) { newState.dead = true; newState.gameOver = true; }
                }
              } else { logs.push("You walked away from the challenge."); }
              break;
            case "wild_stash_house":
              if (action === "search") {
                if (roll(0.6)) {
                  const loot = rand(500, 5000);
                  const d = DRUGS[rand(0, DRUGS.length - 1)];
                  const qty = rand(2, 10);
                  const cnt = Object.values(newState.inventory).reduce((a, b) => a + b, 0);
                  newState.cash += loot;
                  if (cnt + qty <= newState.coatSize) {
                    newState.inventory = { ...newState.inventory, [d.name]: (newState.inventory[d.name] || 0) + qty };
                    logs.push(`Jackpot! Found $${loot.toLocaleString()} and ${qty}x ${d.emoji} ${d.name}!`);
                  } else {
                    logs.push(`Found $${loot.toLocaleString()}! No room for the drugs though.`);
                  }
                } else {
                  const dmg = rand(10, 25);
                  newState.health = Math.max(0, newState.health - dmg);
                  logs.push(`It was a trap! Took ${dmg} damage.`);
                  if (newState.health <= 0) { newState.dead = true; newState.gameOver = true; }
                }
              } else { logs.push("You left the stash house alone."); }
              break;
            case "wild_corrupt_cop":
              if (action === "pay") { newState.cash -= sc.amount; newState.protection = true; logs.push("You've got police protection for today."); }
              else { logs.push("You declined the officer's offer."); }
              break;
            case "wild_hospital":
              if (action === "heal") { newState.cash -= sc.amount; newState.health = MAX_HP; logs.push("Fully healed by the back-alley doc."); }
              else { logs.push("You passed on the doctor."); }
              break;
            default:
              logs.push("...");
          }

          newState.log = [...logs, ...newState.log].slice(0, 100);
          const remaining = newState.scenarioQueue.slice(1);
          newState.scenarioQueue = remaining;
          newState.scenario = remaining.length > 0 ? remaining[0] : null;
          return newState;
        });
      };

      const travel = (dest) => {
        let copChance = s.protection ? 0.03 : (0.08 + (s.day / MAX_DAYS) * 0.2 + (invCount / s.coatSize) * 0.08);
        if (s.crew.includes("tweaky_pete")) copChance *= 0.6;
        if (s.reputation[dest] && s.reputation[dest] < 30) copChance *= 1.3;

        if (roll(copChance)) {
          const numCops = rand(1, Math.min(2 + Math.floor(s.day / 6), 10));
          setS((p) => ({ ...p, combat: { cops: numCops, destination: dest } }));
          return;
        }
        arriveAt(dest);
      };

      const arriveAt = (dest) => {
        setS((p) => {
          const newDay = p.day + 1;
          const newDebt = p.debt > 0 ? Math.round(p.debt * (1 + DEBT_INTEREST)) : 0;
          const ev = pickPriceEvent();
          const scenarios = pickScenarios(p);

          // Story events
          let storyScenario = null;
          switch (newDay) {
            case 3: {
              storyScenario = {
                type: "story_cartel",
                displayMsg: "A guy named 'Cartel Carlos' approaches you at a taco truck. He offers a bulk shipment deal — 10 units of any drug at 40% off. Decide NOW.",
                choices: [
                  { label: "Cocaine", action: "buy_cartel_cocaine", style: "bg-blue-600 hover:bg-blue-500 text-white" },
                  { label: "Heroin", action: "buy_cartel_heroin", style: "bg-blue-600 hover:bg-blue-500 text-white" },
                  { label: "Decline", action: "decline_cartel", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]
              };
              break;
            }
            case 7: {
              storyScenario = {
                type: "story_da",
                displayMsg: "The Travis County DA just released 47 inmates due to 'overcrowding.' Streets are chaos. Cop encounters -50% for 3 days, mugging chance doubles.",
                choices: [
                  { label: "OK", action: "ok", style: "bg-blue-600 hover:bg-blue-500 text-white" },
                ]
              };
              break;
            }
            case 10: {
              storyScenario = {
                type: "story_tech_bro",
                displayMsg: "A tech bro from the Domain wants to 'invest' in your startup. He offers $10,000 for 20% of your daily profits going forward. Deal?",
                choices: [
                  { label: "Deal", action: "accept_tech_bro", style: "bg-green-600 hover:bg-green-500 text-white" },
                  { label: "Decline", action: "decline_tech_bro", style: "bg-gray-600 hover:bg-gray-500 text-white" },
                ]
              };
              break;
            }
            case 22: {
              storyScenario = {
                type: "story_sxsw",
                displayMsg: "SXSW is back! Every party drug price TRIPLES for 3 days. The Domain and East 6th are crawling with buyers AND cops.",
                choices: [
                  { label: "OK", action: "ok", style: "bg-blue-600 hover:bg-blue-500 text-white" },
                ]
              };
              break;
            }
            case 25: {
              storyScenario = {
                type: "story_busted_connect",
                displayMsg: "Your connect got busted. For the next 3 days, you can't BUY any drugs — only sell. Better have stocked up!",
                choices: [
                  { label: "OK", action: "ok", style: "bg-blue-600 hover:bg-blue-500 text-white" },
                ]
              };
              break;
            }
          }

          if (newDay > MAX_DAYS) {
            const finalScore = { name: "Monty", netWorth: p.cash + p.bank - p.debt + Math.round(Object.entries(p.inventory).reduce((sum, [drug, qty]) => {
              const d = DRUGS.find((dd) => dd.name === drug);
              return sum + (d ? ((d.min + d.max) / 2) * qty : 0);
            }, 0)), daysSurvived: p.day - 1, kills: p.kills || 0 };
            setScores((prev) => [...prev, finalScore].sort((a, b) => b.netWorth - a.netWorth));
            return { ...p, day: newDay, location: dest, debt: newDebt, gameOver: true, combat: null, event: null, scenario: null, doubleSell: false, protection: false, mods: {} };
          }

          let ns = { ...p, day: newDay, location: dest, debt: newDebt, event: ev, combat: null,
            doubleSell: false, protection: false, mods: {},
            prices: genPrices(ev, null),
            log: [`Traveled to ${dest}. Day ${newDay}.`, ...p.log].slice(0, 100) };

          // Deduct crew costs
          if (ns.crew.length > 0) {
            const crewCost = ns.crew.reduce((sum, id) => sum + (CREW_MEMBERS.find(c => c.id === id)?.cost || 0), 0);
            ns.cash -= crewCost;
            ns.log = [`Paid crew $${crewCost}.`, ...ns.log].slice(0, 100);
          }

          // Crew betrayal
          ns.crew = ns.crew.filter((id) => !roll(0.02));

          // Safe house raid
          if (ns.safeHouses[dest]) {
            if (roll(0.03)) {
              ns.safeHouses[dest] = { ...ns.safeHouses[dest], stashed: 0, raided: true };
              ns.log = [`Your safe house in ${dest} was RAIDED! All drugs lost!`, ...ns.log].slice(0, 100);
            }
          }

          // Chemist duplication
          if (ns.crew.includes("molly") && roll(0.15)) {
            const keys = Object.keys(ns.inventory);
            if (keys.length > 0) {
              const randomDrug = keys[rand(0, keys.length - 1)];
              ns.inventory = { ...ns.inventory, [randomDrug]: ns.inventory[randomDrug] * 2 };
              ns.log = [`Prof. Molly doubled your ${randomDrug}!`, ...ns.log].slice(0, 100);
            }
          }

          ns = processScenarios(ns, scenarios);
          if (ns.mods.fireSale || ns.mods.festival || ns.mods.influencer) {
            ns.prices = genPrices(ev, ns.mods);
          }

          if (storyScenario) {
            ns.scenario = storyScenario;
            ns.scenarioQueue = [storyScenario];
          }

          return ns;
        });
      };

      const handleCombat = (action) => {
        setS((p) => {
          if (!p.combat) return p;
          const { cops, destination } = p.combat;
          const gun = bestGun(p.weapons);
          const gunData = gun ? GUNS.find((g) => g.name === gun) : null;

          if (action === "bribe") {
            let bribeAmt = cops * rand(500, 2000);
            if (p.crew.includes("chad")) bribeAmt = Math.round(bribeAmt * 0.4);
            if (p.cash >= bribeAmt) {
              const ns = { ...p, cash: p.cash - bribeAmt, combat: null,
                log: [`Bribed the cops with $${bribeAmt.toLocaleString()}. They looked the other way.`, ...p.log].slice(0, 100) };
              const nDay = ns.day + 1;
              const nDebt = ns.debt > 0 ? Math.round(ns.debt * (1 + DEBT_INTEREST)) : 0;
              const ev = pickPriceEvent();
              if (nDay > MAX_DAYS) return { ...ns, day: nDay, location: destination, debt: nDebt, gameOver: true, event: null };
              const scenarios = pickScenarios(ns);
              let final = { ...ns, day: nDay, location: destination, debt: nDebt, event: ev,
                doubleSell: false, protection: false, mods: {},
                prices: genPrices(ev, null),
                log: [`Arrived at ${destination}. Day ${nDay}.`, ...ns.log].slice(0, 100) };
              final = processScenarios(final, scenarios);
              if (final.mods.fireSale || final.mods.festival || final.mods.influencer) final.prices = genPrices(ev, final.mods);
              return final;
            } else {
              return { ...p, log: [`Can't afford the bribe ($${bribeAmt.toLocaleString()})! Try something else.`, ...p.log].slice(0, 100) };
            }
          }

          if (action === "fight") {
            const yourDmg = gunData ? rand(gunData.dmg[0], gunData.dmg[1]) : rand(2, 8);
            const acc = gunData ? gunData.accuracy : 0.4;
            const hit = roll(acc);
            const killed = hit ? (yourDmg >= 20 ? Math.min(cops, rand(1, 3)) : 1) : 0;
            const remaining = Math.max(0, cops - killed);
            let theirDmg = cops * rand(2, 7);
            if (p.crew.includes("big_hondo")) theirDmg = Math.round(theirDmg * 0.5);
            const newHP = Math.max(0, p.health - theirDmg);

            if (newHP <= 0) {
              const finalScore = { name: "Monty", netWorth: p.cash + p.bank - p.debt + Math.round(Object.entries(p.inventory).reduce((sum, [drug, qty]) => {
                const d = DRUGS.find((dd) => dd.name === drug);
                return sum + (d ? ((d.min + d.max) / 2) * qty : 0);
              }, 0)), daysSurvived: p.day, kills: p.kills || 0 };
              setScores((prev) => [...prev, finalScore].sort((a, b) => b.netWorth - a.netWorth));
              return { ...p, health: 0, combat: null, gameOver: true, dead: true,
                log: ["You were gunned down in the streets of Austin.", ...p.log] };
            }

            if (remaining <= 0) {
              const loot = rand(200, 3000);
              let ns = { ...p, health: newHP, cash: p.cash + loot, combat: null, kills: (p.kills || 0) + killed,
                log: [`Took out all the cops! Found $${loot.toLocaleString()}. Took ${theirDmg} damage.`, ...p.log].slice(0, 100) };
              const nDay = ns.day + 1;
              const nDebt = ns.debt > 0 ? Math.round(ns.debt * (1 + DEBT_INTEREST)) : 0;
              const ev = pickPriceEvent();
              if (nDay > MAX_DAYS) {
                const finalScore = { name: "Monty", netWorth: ns.cash + ns.bank - ns.debt + Math.round(Object.entries(ns.inventory).reduce((sum, [drug, qty]) => {
                  const d = DRUGS.find((dd) => dd.name === drug);
                  return sum + (d ? ((d.min + d.max) / 2) * qty : 0);
                }, 0)), daysSurvived: nDay - 1, kills: ns.kills };
                setScores((prev) => [...prev, finalScore].sort((a, b) => b.netWorth - a.netWorth));
                return { ...ns, day: nDay, location: destination, debt: nDebt, gameOver: true, event: null };
              }
              const scenarios = pickScenarios(ns);
              let final = { ...ns, day: nDay, location: destination, debt: nDebt, event: ev,
                doubleSell: false, protection: false, mods: {},
                prices: genPrices(ev, null),
                log: [`Made it to ${destination}. Day ${nDay}.`, ...ns.log].slice(0, 100) };
              final = processScenarios(final, scenarios);
              if (final.mods.fireSale || final.mods.festival || final.mods.influencer) final.prices = genPrices(ev, final.mods);
              return final;
            }

            return { ...p, health: newHP, combat: { cops: remaining, destination },
              log: [`${hit ? `Hit! Took out ${killed} cop${killed > 1 ? "s" : ""}.` : "Missed!"} ${remaining} left. Took ${theirDmg} damage.`, ...p.log].slice(0, 100) };
          }

          // Run
          const escaped = roll(0.5 + (p.weapons.length > 0 ? 0.1 : 0));
          if (escaped) {
            let ns = { ...p, combat: null, log: ["You escaped the cops!", ...p.log].slice(0, 100) };
            const nDay = ns.day + 1;
            const nDebt = ns.debt > 0 ? Math.round(ns.debt * (1 + DEBT_INTEREST)) : 0;
            const ev = pickPriceEvent();
            if (nDay > MAX_DAYS) {
              const finalScore = { name: "Monty", netWorth: ns.cash + ns.bank - ns.debt + Math.round(Object.entries(ns.inventory).reduce((sum, [drug, qty]) => {
                const d = DRUGS.find((dd) => dd.name === drug);
                return sum + (d ? ((d.min + d.max) / 2) * qty : 0);
              }, 0)), daysSurvived: nDay - 1, kills: ns.kills || 0 };
              setScores((prev) => [...prev, finalScore].sort((a, b) => b.netWorth - a.netWorth));
              return { ...ns, day: nDay, location: destination, debt: nDebt, gameOver: true, event: null };
            }
            const scenarios = pickScenarios(ns);
            let final = { ...ns, day: nDay, location: destination, debt: nDebt, event: ev,
              doubleSell: false, protection: false, mods: {},
              prices: genPrices(ev, null),
              log: [`Escaped to ${destination}. Day ${nDay}.`, ...ns.log].slice(0, 100) };
            final = processScenarios(final, scenarios);
            if (final.mods.fireSale || final.mods.festival || final.mods.influencer) final.prices = genPrices(ev, final.mods);
            return final;
          }

          // Failed run
          const dmg = cops * rand(2, 5);
          const newHP2 = Math.max(0, p.health - dmg);
          const inv = { ...p.inventory };
          const dropped = [];
          Object.keys(inv).forEach((k) => {
            const drop = Math.ceil(inv[k] * 0.2);
            if (drop > 0) { dropped.push(`${drop} ${k}`); inv[k] -= drop; if (inv[k] <= 0) delete inv[k]; }
          });

          if (newHP2 <= 0) {
            const finalScore = { name: "Monty", netWorth: p.cash + p.bank - p.debt + Math.round(Object.entries(p.inventory).reduce((sum, [drug, qty]) => {
              const d = DRUGS.find((dd) => dd.name === drug);
              return sum + (d ? ((d.min + d.max) / 2) * qty : 0);
            }, 0)), daysSurvived: p.day, kills: p.kills || 0 };
            setScores((prev) => [...prev, finalScore].sort((a, b) => b.netWorth - a.netWorth));
            return { ...p, health: 0, combat: null, gameOver: true, dead: true,
              log: ["Shot while running. You didn't make it.", ...p.log] };
          }

          return { ...p, health: newHP2, inventory: inv, combat: { cops, destination },
            log: [`Couldn't escape! -${dmg} HP.${dropped.length ? ` Dropped ${dropped.join(", ")}.` : ""}`, ...p.log].slice(0, 100) };
        });
      };

      const buyGun = (name) => {
        setS((p) => {
          const g = GUNS.find((gg) => gg.name === name);
          if (!g || p.weapons.includes(name) || p.cash < g.cost) return p;
          return { ...p, cash: p.cash - g.cost, weapons: [...p.weapons, name],
            log: [`Bought a ${name} for $${g.cost.toLocaleString()}.`, ...p.log].slice(0, 100) };
        });
      };

      const heal = (cost, hp) => {
        setS((p) => {
          if (p.cash < cost) return p;
          const actual = Math.min(hp, MAX_HP - p.health);
          return { ...p, cash: p.cash - cost, health: Math.min(MAX_HP, p.health + actual),
            log: [`Healed ${actual} HP for $${cost.toLocaleString()}.`, ...p.log].slice(0, 100) };
        });
      };

      const deposit = (v) => setS((p) => { const a = Math.min(v, p.cash); return a > 0 ? { ...p, cash: p.cash - a, bank: p.bank + a, log: [`Deposited $${a.toLocaleString()}.`, ...p.log].slice(0, 100) } : p; });
      const withdraw = (v) => setS((p) => { const a = Math.min(v, p.bank); return a > 0 ? { ...p, cash: p.cash + a, bank: p.bank - a, log: [`Withdrew $${a.toLocaleString()}.`, ...p.log].slice(0, 100) } : p; });
      const payDebt = (v) => setS((p) => { const a = Math.min(v, p.cash, p.debt); return a > 0 ? { ...p, cash: p.cash - a, debt: p.debt - a, log: [`Paid $${a.toLocaleString()} to the shark.`, ...p.log].slice(0, 100) } : p; });
      const borrow = (v) => v > 0 ? setS((p) => ({ ...p, cash: p.cash + v, debt: p.debt + v, log: [`Borrowed $${v.toLocaleString()}.`, ...p.log].slice(0, 100) })) : null;

      const useContact = (id) => {
        setS((p) => {
          if (p.contacts[id]) return p;
          switch (id) {
            case "diego": {
              if (p.cash < 100) return p;
              const loc = LOCATIONS[rand(0, LOCATIONS.length - 1)];
              const preview = genPrices(null, null);
              const best = Object.entries(preview).sort((a, b) => b[1] - a[1])[0];
              return { ...p, cash: p.cash - 100, contacts: { ...p.contacts, diego: true },
                log: [`📱 Diego says: "${best[0]} is hot in ${loc.name} — $${best[1].toLocaleString()}."`, ...p.log].slice(0, 100) };
            }
            case "linda": {
              if (p.cash < 500) return p;
              return { ...p, cash: p.cash - 500, protection: true, contacts: { ...p.contacts, linda: true },
                log: [`📱 Lawyer Linda: "I'll handle the next one. The DA owes me a favor anyway."`, ...p.log].slice(0, 100) };
            }
            case "patch": {
              if (p.cash < 300) return p;
              const healed = Math.min(30, MAX_HP - p.health);
              return { ...p, cash: p.cash - 300, health: Math.min(MAX_HP, p.health + healed), contacts: { ...p.contacts, patch: true },
                log: [`📱 Doc Patch patched you up. +${healed} HP.`, ...p.log].slice(0, 100) };
            }
            case "sammy": {
              if (p.cash < 200) return p;
              const drug = DRUGS[rand(0, DRUGS.length - 1)];
              const loc = LOCATIONS[rand(0, LOCATIONS.length - 1)];
              return { ...p, cash: p.cash - 200, contacts: { ...p.contacts, sammy: true },
                log: [`📱 Snitch Sammy: "I heard ${drug.emoji} ${drug.name} is moving big in ${loc.name}. Don't tell 'em I told you."`, ...p.log].slice(0, 100) };
            }
            case "frank": {
              if (p.cash < 1000) return p;
              const newRep = { ...p.reputation };
              Object.keys(newRep).forEach(k => { newRep[k] = Math.min(100, newRep[k] + 15); });
              return { ...p, cash: p.cash - 1000, reputation: newRep, contacts: { ...p.contacts, frank: true },
                log: [`📱 Fixer Frank: "Heat's off. I called in every favor I had. You owe me a Whataburger."`, ...p.log].slice(0, 100) };
            }
            default: return p;
          }
        });
      };

      const depositToSafe = (drug, amt) => {
        setS((p) => {
          const safe = p.safeHouses[p.location];
          if (!safe || !p.inventory[drug] || p.inventory[drug] < amt) return p;
          const space = safe.capacity - safe.stashed;
          const actual = Math.min(amt, space);
          if (actual <= 0) return p;
          const inv = { ...p.inventory };
          inv[drug] = (inv[drug] || 0) - actual;
          if (inv[drug] <= 0) delete inv[drug];
          const newSafe = { ...safe, stashed: safe.stashed + actual, drugs: { ...(safe.drugs || {}), [drug]: ((safe.drugs || {})[drug] || 0) + actual } };
          return { ...p, inventory: inv, safeHouses: { ...p.safeHouses, [p.location]: newSafe },
            log: [`Stashed ${actual} ${drug} in your ${safe.type}.`, ...p.log].slice(0, 100) };
        });
      };

      const withdrawFromSafe = (drug, amt) => {
        setS((p) => {
          const safe = p.safeHouses[p.location];
          if (!safe || !safe.drugs || !safe.drugs[drug] || safe.drugs[drug] < amt) return p;
          const cnt = Object.values(p.inventory).reduce((a, b) => a + b, 0);
          const actual = Math.min(amt, p.coatSize - cnt);
          if (actual <= 0) return p;
          const inv = { ...p.inventory, [drug]: (p.inventory[drug] || 0) + actual };
          const newDrugs = { ...safe.drugs, [drug]: safe.drugs[drug] - actual };
          if (newDrugs[drug] <= 0) delete newDrugs[drug];
          const newStashed = Object.values(newDrugs).reduce((a, b) => a + b, 0);
          const newSafe = { ...safe, stashed: newStashed, drugs: newDrugs };
          return { ...p, inventory: inv, safeHouses: { ...p.safeHouses, [p.location]: newSafe },
            log: [`Took ${actual} ${drug} from your ${safe.type}.`, ...p.log].slice(0, 100) };
        });
      };

      const hireCrew = (id) => {
        setS((p) => {
          const cm = CREW_MEMBERS.find(c => c.id === id);
          if (!cm || p.crew.includes(id) || p.cash < cm.cost) return p;
          return { ...p, cash: p.cash - cm.cost, crew: [...p.crew, id],
            log: [`Hired ${cm.name}.`, ...p.log].slice(0, 100) };
        });
      };

      const fireCrew = (id) => {
        setS((p) => {
          return { ...p, crew: p.crew.filter(c => c !== id),
            log: [`Fired a crew member.`, ...p.log].slice(0, 100) };
        });
      };

      const buySafeHouse = (type) => {
        setS((p) => {
          const sh = SAFE_HOUSES.find(s => s.type === type);
          if (!sh || p.safeHouses[p.location] || p.cash < sh.cost) return p;
          return { ...p, cash: p.cash - sh.cost, safeHouses: { ...p.safeHouses, [p.location]: { type, capacity: sh.capacity, stashed: 0, drugs: {}, raided: false } },
            log: [`Bought a ${type} in ${p.location}.`, ...p.log].slice(0, 100) };
        });
      };

      const activeScenarios = s.scenarioQueue || [];

      return (
        <div className="min-h-screen bg-gray-950 text-white selection:bg-blue-600">
          <div className="max-w-5xl mx-auto p-3 pb-12">
            {/* Title */}
            <div className="text-center mb-4 pt-2">
              <h1 className="text-4xl font-black tracking-tighter"
                style={{ background: "linear-gradient(135deg, #ef4444, #f59e0b, #22c55e)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                DOPE WARS
              </h1>
              <p className="text-gray-500 text-xs mt-0.5 tracking-widest">AUSTIN TX · {MAX_DAYS} DAYS TO HUSTLE</p>
            </div>

            <StatusBar s={s} invCount={invCount} />
            <HPBar health={s.health} />
            <EventBanner event={s.event} scenarios={activeScenarios.map((sc) => ({ displayMsg: sc.displayMsg, good: false, bad: true }))} />

            {/* Location */}
            <div className="mb-3 flex items-center gap-2">
              <span className="text-sm font-bold text-gray-400">📍 Location:</span>
              <span className="text-sm font-bold text-blue-400">{s.location}</span>
            </div>

            {/* Market */}
            <div className="bg-gray-800 bg-opacity-40 border border-gray-700 rounded-lg p-3 mb-4">
              <h3 className="text-sm font-bold text-green-400 mb-2">💸 Market</h3>
              <MarketTable prices={s.prices} inventory={s.inventory} cash={s.cash} onBuy={buy} onSell={sell} invCount={invCount} coatSize={s.coatSize} doubleSell={s.doubleSell} />
            </div>

            {/* Tabs */}
            <div className="mb-4 flex gap-1 border-b border-gray-700">
              <TabButton label="Travel" active={tab === "travel"} onClick={() => setTab("travel")} />
              <TabButton label="Crew" active={tab === "crew"} onClick={() => setTab("crew")} />
              <TabButton label="Safe Houses" active={tab === "safe"} onClick={() => setTab("safe")} />
              <TabButton label="Phone" active={tab === "phone"} onClick={() => setTab("phone")} />
              <TabButton label="Bank" active={tab === "bank"} onClick={() => setTab("bank")} />
              <TabButton label="Guns" active={tab === "guns"} onClick={() => setTab("guns")} />
              <TabButton label="Heal" active={tab === "heal"} onClick={() => setTab("heal")} />
              <TabButton label="Log" active={tab === "log"} onClick={() => setTab("log")} />
            </div>

            {/* Tab Content */}
            <div className="space-y-3 mb-4">
              {tab === "travel" && <TravelPanel current={s.location} onTravel={travel} rep={s.reputation} />}
              {tab === "crew" && <CrewPanel crew={s.crew} cash={s.cash} onHire={hireCrew} onFire={fireCrew} />}
              {tab === "safe" && <SafeHousePanel current={s.location} location={LOCATIONS.find(l => l.name === s.location)} safeHouses={s.safeHouses} cash={s.cash} onBuySafe={buySafeHouse} onDepositDrug={depositToSafe} onWithdrawDrug={withdrawFromSafe} />}
              {tab === "phone" && <PhonePanel cash={s.cash} day={s.day} contacts={s.contacts} onUseContact={useContact} />}
              {tab === "bank" && <BankPanel cash={s.cash} bank={s.bank} onDeposit={deposit} onWithdraw={withdraw} />}
              {tab === "guns" && <GunShop cash={s.cash} weapons={s.weapons} onBuy={buyGun} />}
              {tab === "heal" && <HealShop cash={s.cash} health={s.health} onHeal={heal} />}
              {tab === "log" && <ActivityLog log={s.log} />}
            </div>

            {/* Bottom panels */}
            <div className="grid grid-cols-2 gap-3">
              <LoanShark cash={s.cash} debt={s.debt} onPay={payDebt} onBorrow={borrow} />
            </div>
          </div>

          {s.combat && <CombatModal cops={s.combat.cops} gun={bestGun(s.weapons)} health={s.health} onAction={handleCombat} />}
          {s.scenario && <ScenarioModal scenario={s.scenario} onResolve={resolveScenario} />}
          {s.gameOver && <GameOverModal s={s} onRestart={() => setS(newGame())} scores={scores} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(DopeWars));
  </script>
</body>
</html>
